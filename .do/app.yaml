name: did

services:
  - name: did
    github:
      branch: main
      deploy_on_push: true
      repo: kplawver/did
    dockerfile_path: Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: professional-xs
    routes:
      - path: /
    health_check:
      http_path: /up
    envs:
      - key: RAILS_MASTER_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: APP_HOST
        scope: RUN_TIME
        value: ${APP_DOMAIN}
      - key: ALLOWED_HOSTS
        scope: RUN_TIME
        value: ${APP_DOMAIN}
      - key: WEBAUTHN_ORIGIN
        scope: RUN_TIME
        value: https://${APP_DOMAIN}
      - key: WEBAUTHN_RP_ID
        scope: RUN_TIME
        value: ${APP_DOMAIN}
      - key: SOLID_QUEUE_IN_PUMA
        scope: RUN_TIME
        value: "1"
      - key: DEVISE_MAILER_SENDER
        scope: RUN_TIME
        value: noreply@${APP_DOMAIN}
      # SMTP — uncomment and configure when ready
      # - key: SMTP_ADDRESS
      #   scope: RUN_TIME
      # - key: SMTP_PORT
      #   scope: RUN_TIME
      #   value: "587"
      # - key: SMTP_USERNAME
      #   scope: RUN_TIME
      # - key: SMTP_PASSWORD
      #   scope: RUN_TIME
      #   type: SECRET

databases:
  - name: db
    engine: PG
    version: "18"
    size: db-s-dev-database
    num_nodes: 1
