# MySQL-compatible database via the trilogy adapter.
# Development uses Dolt (MySQL-compatible); production uses MySQL 8.
#
# Dev setup: dolt sql-server -u root
#
default: &default
  adapter: trilogy
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 3306) %>
  username: <%= ENV.fetch("DB_USERNAME", "root") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: did_development

test:
  <<: *default
  database: did_test

production:
  primary: &primary_production
    <<: *default
    database: did_production
    username: <%= ENV.fetch("DB_USERNAME", "did") %>
    password: <%= ENV["DID_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: did_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: did_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: did_production_cable
    migrations_paths: db/cable_migrate
